name: Publish to PyPI

# Publishes to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) -- no API token/secret needed once the
# publisher is configured on PyPI (see README "Publishing" section).

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tvccointreg
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
